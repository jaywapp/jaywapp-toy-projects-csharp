name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore AIInstaller.sln

      - name: Build
        run: dotnet build AIInstaller.sln -c Release --no-restore

      - name: Publish (win-x64, single file)
        run: >
          dotnet publish AIInstaller.App/AIInstaller.App.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:EnableCompressionInSingleFile=true
          -o publish/win-x64

      - name: Pack release assets
        shell: pwsh
        run: |
          $version = if ("${{ github.ref_type }}" -eq "tag") { "${{ github.ref_name }}" } else { "manual-${{ github.run_number }}" }
          New-Item -ItemType Directory -Force -Path out | Out-Null
          $zipPath = "out/AIInstaller-win-x64-$version.zip"
          Compress-Archive -Path "publish/win-x64/*" -DestinationPath $zipPath -Force
          (Get-FileHash -Path $zipPath -Algorithm SHA256).Hash | Out-File "out/AIInstaller-win-x64-$version.sha256" -Encoding ascii

      - name: Upload workflow artifact (manual runs)
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: AIInstaller-win-x64-manual
          path: out/*

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            out/*.zip
            out/*.sha256
